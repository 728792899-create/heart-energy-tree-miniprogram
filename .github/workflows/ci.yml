name: Public repository CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Tests, shared source, syntax and budgets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: npm run check:shared
      - run: npm run check:syntax
      - run: npm run check:cloud-deps
      - run: npm run check:budgets

  cloud-dependencies:
    name: Clean cloud function dependency install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudfunctions/energyTree/package-lock.json
      - run: npm ci --prefix cloudfunctions/energyTree --ignore-scripts
      - run: npm ls --prefix cloudfunctions/energyTree --omit=dev

  remotion-smoke:
    name: Remotion compositions and real still render
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: motion-studio/package-lock.json
      - run: npm ci --prefix motion-studio --ignore-scripts
      - run: npm run motion:compositions
      - run: npm run motion:smoke
      - run: test -s motion-studio/out/smoke/binding-frame.png
      - run: test -z "$(git status --short --untracked-files=all)"
